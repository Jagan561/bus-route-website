<!DOCTYPE html>
<html>
<head>
    <title>R 13 Vyasarpadi</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* 🔹 Navbar */
        nav {
            background: rgba(0,0,0,0.8);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            color: yellow;
        }

        /* 🔹 Hero Section */
        .hero {
            height: 90vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        /* 🔹 Background image with opacity */
        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("C:\Users\kevin\Downloads\WhatsApp Image 2026-03-27 at 8.05.20 PM.jpeg") no-repeat center center/cover;
            opacity: 0.4;   /* 👈 Light opacity */
            z-index: -1;
        }

        /* 🔹 Text styling */
        .hero h1 {
            font-size: 70px;
            margin: 0;
        }

        .hero p {
            font-size: 24px;
            margin-top: 10px;
            font-style: italic;
        }

    </style>
</head>

<body>

<!-- 🔹 Navbar -->
<nav>
    <a href="#">Home</a>
    <a href="#">Student</a>
    <a href="#">Admin</a>
    <a href="#">Gallery</a>
    <a href="#">Coordinators</a>
    <a href="#">Contact Us</a>
</nav>

<!-- 🔹 Hero Section -->
<div class="hero">
    <div>
        <h1>🚌 R 13</h1>
        <p>"It’s not a bus route, it’s an emotion to us"</p>
    </div>
</div>

</body>
</html>
